name: Router Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: starfish
          POSTGRES_USER: starfish
          POSTGRES_PASSWORD: starfish
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_NAME: starfish
      DATABASE_USER: starfish
      DATABASE_PASSWORD: starfish
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "True"

    defaults:
      run:
        working-directory: router

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --extras agent

      - name: Run migrations
        run: poetry run python3 manage.py migrate

      - name: Run tests
        run: poetry run python3 manage.py test
